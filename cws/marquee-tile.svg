<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
    <!-- Background -->
    <rect width="1400" height="560" fill="rgb(50,73,88)"/>
    
    <!-- Abstract background motif -->
    <g fill="rgba(216,216,216, 0.03)">
        <rect x="1100" y="-100" width="400" height="400" rx="60" transform="rotate(15 1300 100)"/>
        <rect x="-100" y="300" width="300" height="300" rx="50" transform="rotate(-10 50 450)"/>
    </g>

    <!-- Logo -->
    <g transform="translate(250, 130) scale(3)">
        <rect width="100" height="100" rx="24" fill="rgba(0,0,0,0.1)"/>
        <g fill="rgb(216,216,216)">
            <rect x="10" y="10" width="24" height="24" rx="4"/>
            <rect x="38" y="38" width="24" height="24" rx="4"/>
            <text x="78" y="32" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">3</text>
        </g>
        <g fill="rgb(255,165,0)">
            <rect x="66" y="66" width="24" height="24" rx="4"/>
        </g>
    </g>

    <!-- Text Group -->
    <g transform="translate(620, 280)">
        <text x="0" y="0" font-family="sans-serif" font-size="120" font-weight="900" fill="rgb(216,216,216)">matrix³</text>
        <text x="5" y="60" font-family="sans-serif" font-size="36" fill="rgb(216,216,216)" opacity="0.8">A Minimal Content Security Policy Manager</text>
    </g>
    
    <!-- Bottom right accent -->
    <rect x="1300" y="480" width="40" height="40" rx="8" fill="rgb(255,165,0)" opacity="0.5"/>
    <rect x="1240" y="480" width="40" height="40" rx="8" fill="rgb(216,216,216)" opacity="0.2"/>
</svg>
