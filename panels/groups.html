<html>
<head>
    <title>Groups</title>
    <meta charset="UTF-8">
    <script src="groups.js" type="module"></script>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
<select id="panel"></select>
<h1>Groups</h1>
<p>
    <input type=text id=newname placeholder="Group name" />
    <button id="addgroup">Add Group</button>
</p>
<hr>
<div id="groups"></div>

<template id="group-template">
    <section class="group">
        <h3 class="group-name"></h3>
        <ul></ul>
        <p>
            <input type=text class="neworigin" placeholder="Origin">
            <button class="addorigin">Add Origin</button>
            <button class="delgroup">Delete Group</button>
        </p>
    </section>
</template>

<template id="origin-template">
    <li><button class="delorigin" title="Remove">&times;</button><span class="origin-name"></span></li>
</template>
</body>
</html>
