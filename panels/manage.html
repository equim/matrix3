<html>
<head>
    <title>Rules</title>
    <script src="rules.js" type="module"></script>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
<select id="panel"></select>
<h1>Rules</h1>
<p>
    <input type="text" id="filter" placeholder="Filter...">
</p>
<p>
<table id="dynamic">
    <caption>Dynamic Rules</caption>
</table>
</p>
<p>
<table id="session">
    <caption>Session Rules</caption>
</table>
</p>
<p>
<table id="static">
    <caption>Static Rulesets</caption>
</table>
</p>
<p>
    <button id="remove" title="Remove checked rules">Remove</button>
    <button id="commit" title="Promote checked session rules into dynamic rules">Commit</button>
    <button id="reset" title="Reset all rules">Reset</button>
</p>
</body>
</html>
