<html>
<head>
    <title>Options</title>
    <meta charset="UTF-8">
    <script src="options.js" type="module"></script>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
<select id="panel"></select>
<h1>Options</h1>
<form>
    <table>
        <caption>matrix³ Options</caption>
        <thead>
        </thead>
        <tbody>
            <tr>
                <td><label for=defaultpolicy>Default Policy Strictness</label></td>
                <td>
                    <datalist id=policies>
                        <option value=0 label="Off" />
                        <option value=1 label="Permissive" />
                        <option value=2 label="First Party" />
                        <option value=3 label="Sandboxed" />
                        <option value=4 label="Strict" />
                    </datalist>
                    <input type=range list=policies id=defaultpolicy min=0 max=4 step=1 value=0 class=option />
                </td>
            </tr>
            <tr>
                <td><label for=advanced>Show Advanced Directives</label></td>
                <td><input type=checkbox id=advanced class=option /></td>
            </tr>
            <tr>
                <td><label for=implicitattr>Implicit Attribute/Element Sources</label></td>
                <td><input type=checkbox id=implicitattr class=option /></td>
            </tr>
            <tr>
                <td><label for=unsafeokay>Implicit Unsafe Sources</label></td>
                <td><input type=checkbox id=unsafeokay class=option /></td>
            </tr>
            <tr>
                <td><label for=defaultscope>Default Scope</label></td>
                <td>
                    <select id=defaultscope class=option>
                      <option value="Domain">Domain</option>
                      <option value="Origin">Origin</option>
                    </select>
                </td>
            </tr>
        </tbody>
    </table>
</form>
</body>
</html>
