<html>
<head>
    <title>Report</title>
    <meta charset="UTF-8">
    <script src="report.js" type="module"></script>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
<select id="panel"></select>
<h1>Report</h1>
<div>
    <p>
        <label for=frames>Origin</label>
        <select id=frames></select>
    </p>
</div>
<div>
    <button id="commit" title="Make these settings dynamic rules">Commit</button>
    <button id="abandon" title="Discard session changes, restore the dynamic rule">Abandon</button>
    <button id="reset" title="Remove all session and dynamic rules for this host">Reset</button>
    <button id="reload" title="Reload active tab">Reload</button>
    <button id="unblock" title="Allow sources with reported violations">Unblock</button>
</div>
<hr>
<div id="trustcontrol">
    <p>
        <label for="trustgroup">Groups</label>
        <select id="trustgroup"></select>
    </p>
    <button id="trust" title="Add all origins from this group as allowed sources">Trust</button>
    <button id="untrust" title="Uncheck all origins from this group">Untrust</button>
    <hr>
</div>
<div>
    <table id="sources">
        <caption>Source Directives</caption>
        <colgroup>
            <col id=col-src>
            <col id=col-default-src>
            <col id=col-script-src>
            <col id=col-style-src>
            <col id=col-img-src>
            <col id=col-frame-src>
            <col id=col-font-src>
            <col id=col-media-src>
            <col id=col-connect-src>
            <col id=col-worker-src class="advanced">
            <col id=col-child-src class="advanced">
            <col id=col-manifest-src class="advanced">
            <col id=col-object-src class="advanced">
        </colgroup>
        <thead>
            <tr>
                <th id=src>Source</th>
                <th id=default-src title="default-src">📌</th>
                <th id=script-src title="script-src">📜</th>
                <th id=style-src title="style-src">🦚</th>
                <th id=img-src title="img-src">🖼️</th>
                <th id=frame-src title="frame-src">🪟</th>
                <th id=font-src title="font-src">🔤</th>
                <th id=media-src title="media-src">📽️</th>
                <th id=connect-src title="connect-src">🔌</th>
                <th id=worker-src title="worker-src">🔧</th>
                <th id=child-src title="child-src">👶</th>
                <th id=manifest-src title="manifest-src">🪪</th>
                <th id=object-src title="object-src">🧩</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>
<br>
<hr>
<div>
    <table id="sandbox">
        <caption>Sandbox Directives</caption>
        <thead>
            <tr>
            <th><label for=sandbox-enabled>Enabled</label></th>
            <td><input type=checkbox id=sandbox-enabled class=sandbox></td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th><label for=allow-downloads>Downloads</label></td>
                <td><input type=checkbox id=allow-downloads class="sandbox allow"></input></td>
            </tr>
            <tr>
                <th><label for=allow-forms>Forms</label></td>
                <td><input type=checkbox id=allow-forms class="sandbox allow"></input></td>
            </tr>
            <tr>
                <th><label for=allow-modals>Modals</label></td>
                <td><input type=checkbox id=allow-modals class="sandbox allow"></input></td>
            </tr>
            <tr class="advanced">
                <th><label for=allow-orientation-lock>Orientation Lock</label></td>
                <td><input type=checkbox id=allow-orientation-lock class="sandbox allow"></input></td>
            </tr>
            <tr class="advanced">
                <th><label for=allow-pointer-lock>Pointer Lock</label></td>
                <td><input type=checkbox id=allow-pointer-lock class="sandbox allow"></input></td>
            </tr>
            <tr>
                <th><label for=allow-popups>Popups</label></td>
                <td><input type=checkbox id=allow-popups class="sandbox allow"></input></td>
            </tr>
            <tr>
                <th><label for=allow-popups-to-escape-sandbox>Popups Escape Sandbox</label></td>
                <td><input type=checkbox id=allow-popups-to-escape-sandbox class="sandbox allow"></input></td>
            </tr>
            <tr class="advanced">
                <th><label for=allow-presentation>Presentation</label></td>
                <td><input type=checkbox id=allow-presentation class="sandbox allow"></input></td>
            </tr>
            <tr>
                <th><label for=allow-same-origin>Same Origin</label></td>
                <td><input type=checkbox id=allow-same-origin class="sandbox allow"></input></td>
            </tr>
            <tr>
                <th><label for=allow-scripts>Scripts</label></td>
                <td><input type=checkbox id=allow-scripts class="sandbox allow"></input></td>
            </tr>
            <tr class="advanced">
                <th><label for=allow-storage-access-by-user-activation>Storage Access by User Activation</label></td>
                <td><input type=checkbox id=allow-storage-access-by-user-activation class="sandbox allow"></input></td>
            </tr>
            <tr>
                <th><label for=allow-top-navigation>Top Navigation</label></td>
                <td><input type=checkbox id=allow-top-navigation class="sandbox allow"></input></td>
            </tr>
            <tr class="advanced">
                <th><label for=allow-top-navigation-by-user-activation>Top Navigation by User Activation</label></td>
                <td><input type=checkbox id=allow-top-navigation-by-user-activation class="sandbox allow"></input></td>
            </tr>
            <tr class="advanced">
                <th><label for=allow-top-navigation-to-custom-protocols>Top Navigation to Custom Protocols</label></td>
                <td><input type=checkbox id=allow-top-navigation-to-custom-protocols class="sandbox allow"></input></td>
            </tr>
        </tbody>
    </table>
</div>
<br>
<hr>
<div>
<label for=servercsp>Server Suggested Policy</label>
<textarea id=servercsp readonly>
none
</textarea>
<div>
    <button id="accept" disabled title="Replace sources with the suggested policy">Accept</button>
    <button id="merge" disabled title="Add the suggested sources to the current selection">Merge</button>
</div>
</div>
<br>
</body>
</html>
